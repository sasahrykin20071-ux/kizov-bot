<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Kizov FAMQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="brand">
                <span class="brand-mark">KF</span>
                <div>
                    <p class="brand-title">Kizov FAMQ</p>
                    <p class="brand-subtitle">Административный контур</p>
                </div>
            </div>
            <nav class="site-nav">
                <a href="/">Сайт</a>
                <a href="/admin" class="nav-admin">Админка</a>
                <button id="logoutBtn" class="btn btn-ghost">Выйти</button>
            </nav>
        </header>

        <main class="site-main">
            <section id="loginSection" class="panel narrow">
                <h2>Вход администратора</h2>
                <form id="loginForm" class="form-grid">
                    <label>
                        Логин
                        <input type="text" id="username" required>
                    </label>
                    <label>
                        Пароль
                        <input type="password" id="password" required>
                    </label>
                    <div class="full">
                        <button class="btn btn-primary" type="submit">Войти</button>
                    </div>
                </form>
                <div id="loginError" class="notice error hidden">Неверный логин или пароль</div>
            </section>

            <section id="adminPanel" class="hidden">
                <div class="stats-cards">
                    <article class="stats-card">
                        <p>Всего заявок</p>
                        <strong id="statTotal">0</strong>
                    </article>
                    <article class="stats-card">
                        <p>Активные</p>
                        <strong id="statPending">0</strong>
                    </article>
                    <article class="stats-card">
                        <p>Одобрено</p>
                        <strong id="statApproved">0</strong>
                    </article>
                    <article class="stats-card">
                        <p>Отклонено</p>
                        <strong id="statRejected">0</strong>
                    </article>
                </div>

                <div class="panel">
                    <div class="section-head">
                        <h2>Топ рекрутеров</h2>
                        <button id="refreshAdminTopBtn" class="btn btn-ghost">Обновить</button>
                    </div>
                    <div id="adminTopWrap" class="table-wrap">
                        <p class="muted">Загрузка...</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="section-head">
                        <h2>Заявки</h2>
                        <div class="filters">
                            <button class="filter-btn active" data-filter="all">Все</button>
                            <button class="filter-btn" data-filter="pending">Ожидают</button>
                            <button class="filter-btn" data-filter="approved">Одобрены</button>
                            <button class="filter-btn" data-filter="rejected">Отклонены</button>
                        </div>
                    </div>
                    <div id="applicationsList" class="applications-grid">
                        <p class="muted">Загрузка...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
